spring:
  application:
    name: daytrader
  mvc:
    pathmatch:
      matching-strategy: ant-path-matcher
    view:
      prefix: /
      suffix: .jsp
  web:
    resources:
      add-mappings: true

server:
  port: 9080
  servlet:
    context-path: /daytrader
    register-default-servlet: true
    session:
      timeout: 30m