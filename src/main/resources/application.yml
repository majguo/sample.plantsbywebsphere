spring:
  application:
    name: daytrader
  datasource:
    url: jdbc:derby:${daytrader.datasource.path:resources/data/tradedb};create=false
    username: ${DAYTRADER_DB_USER:db_username}
    password: ${DAYTRADER_DB_PASSWORD:db_password}
    driver-class-name: org.apache.derby.jdbc.EmbeddedDriver
  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration/common${daytrader.flyway.additional-locations:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.lob.non_contextual_creation: true
      hibernate.jdbc.time_zone: UTC
  mvc:
    pathmatch:
      matching-strategy: ant-path-matcher
    view:
      prefix: /
      suffix: .jsp
  web:
    resources:
      add-mappings: true

joinfaces:
  faces:
    project-stage: Production
    state-saving-method: server
    default-suffix: .xhtml
  faces-servlet:
    url-mappings: '*.faces,*.xhtml'

server:
  port: 9080
  servlet:
    context-path: /daytrader
    register-default-servlet: true
    session:
      timeout: 30m

daytrader:
  runtime:
    runtime-mode: 0
    order-processing-mode: 0
    long-run: true
    update-quote-prices: true
    publish-quote-price-change: true
    display-order-alerts: true
    market-summary-interval: 20
  async:
    worker-delay-ms: 250
    max-attempts: 5
    retry-delay-ms: 2000
    batch-size: 10
  streaming:
    market-summary-publish-delay-ms: 5000