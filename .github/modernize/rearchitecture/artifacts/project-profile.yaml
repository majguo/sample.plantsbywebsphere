  notes: "DayTrader8 sample application packaged as a WAR with Java EE 8 APIs, Liberty runtime config, and mixed legacy web technologies."

assessment:
  change_type: rewrite
  rationale: |
    The project is a brownfield migration from a Java EE 8/Open Liberty WAR to Spring Boot 3.x.
    It depends on javax-based APIs, container-managed behavior, Liberty configuration, JSF pages,
    JSP pages, CDI injection, JAX-RS resources, and websocket endpoints. Spring Boot 3 requires
    Jakarta namespaces and different runtime integration, so this is a cross-stack rewrite rather
    than an in-place framework upgrade.
  transformations:
    - fromStack: "Open Liberty + Java EE"
      fromStackVersion: "Java EE 8 / Java 8"
      toStack: "Spring Boot"
      toStackVersion: "3.x"
  grouping_needed: false
  deep_planning: true

